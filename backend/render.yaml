services:
  - type: web
    name: vibe-backend
    env: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: vibe-db
          property: connectionString

databases:
  - name: vibe-db
    databaseName: vibe_db
    user: vibe_user
    plan: free
